services:
  # 数据库：持久化业务与运维记录
  mysql:
    image: mysql:5.7
    container_name: devops-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: message_db
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init_mysql.sql:/docker-entrypoint-initdb.d/init_mysql.sql:ro
    networks:
      - devops-network

  # 缓存：热点数据、查询结果缓存
  redis:
    image: redis:alpine
    container_name: devops-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - devops-network

  # 后端 API 服务（仅内部暴露给 nginx）
  backend:
    build: ./backend
    container_name: devops-backend
    restart: always
    depends_on:
      - mysql
      - redis
    networks:
      - devops-network
    expose:
      - "5000"

  # 前端 Vue 静态站点（构建后由 nginx 提供）
  frontend:
    build: ./frontend
    container_name: devops-frontend
    restart: always
    networks:
      - devops-network
    expose:
      - "80"

  # 统一入口：路由到前后端
  nginx:
    build: ./nginx
    container_name: devops-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - devops-network

volumes:
  mysql-data:
  redis-data:

networks:
  devops-network:
