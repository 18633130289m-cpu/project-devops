services:
  mysql:
    image: mysql:5.7
    container_name: devops-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: message_db
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init_mysql.sql:/docker-entrypoint-initdb.d/init_mysql.sql:ro
    networks:
      - devops-network

  redis:
    image: redis:alpine
    container_name: devops-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - devops-network

  backend:
    build: ./backend
    container_name: devops-backend
    restart: always
    depends_on:
      - mysql
      - redis
    networks:
      - devops-network
    expose:
      - "5000"

  frontend:
    build: ./frontend
    container_name: devops-frontend
    restart: always
    networks:
      - devops-network
    expose:
      - "80"

  nginx:
    build: ./nginx
    container_name: devops-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - devops-network

volumes:
  mysql-data:
  redis-data:

networks:
  devops-network:
